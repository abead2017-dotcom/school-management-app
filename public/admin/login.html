<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام إدارة المدارس</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .login-container .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            direction: rtl;
            text-align: right;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .error-message {
            background-color: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            border-right: 4px solid #c33;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .login-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .footer-text {
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }

        .info-box {
            background: #e3f2fd;
            color: #1976d2;
            padding: 15px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            border-right: 4px solid #1976d2;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>نظام إدارة المدارس</h1>
        <p class="subtitle">School Management System</p>

        <div class="info-box">
            <strong>تسجيل دخول المدير</strong>
            <br>
            استخدم الرقم الوطني وكلمة المرور الخاصة بك
        </div>

        <form class="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="nationalId">الرقم الوطني</label>
                <input type="text" id="nationalId" placeholder="أدخل الرقم الوطني" required>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <button type="submit" class="login-button" id="loginBtn">تسجيل الدخول</button>
        </form>

        <p class="footer-text">© 2026 نظام إدارة المدارس - جميع الحقوق محفوظة</p>
    </div>

    <script>
        const API_BASE = '/api';

        // Check if already logged in
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    credentials: 'include'
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.user.role === 'admin') {
                        window.location.href = '/admin/';
                    }
                }
            } catch (error) {
                console.error('Auth check failed:', error);
            }
        });

        async function handleLogin(event) {
            event.preventDefault();

            const nationalId = document.getElementById('nationalId').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');

            loginBtn.disabled = true;
            loginBtn.textContent = 'جاري تسجيل الدخول...';
            errorMessage.classList.remove('show');

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        nationalId,
                        password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'فشل تسجيل الدخول');
                }

                // Check if user is admin
                if (data.user.role !== 'admin') {
                    throw new Error('ليس لديك صلاحيات الوصول إلى لوحة التحكم');
                }

                // Redirect to admin dashboard
                window.location.href = '/admin/';
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'تسجيل الدخول';
            }
        }
    </script>
</body>
</html>
